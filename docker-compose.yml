version: '3.8'

services:
  # ==========================================
  # 1. 向量计算层：隔离版 Milvus (v2.4.0) + Attu
  # ==========================================
  etcd-v2:
    container_name: milvus-etcd-v2
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes_v2/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio-v2:
    container_name: milvus-minio-v2
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9003:9001"
      - "9002:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes_v2/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"

  standalone-v2:
    container_name: milvus-standalone-v2
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd-v2:2379
      MINIO_ADDRESS: minio-v2:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes_v2/milvus:/var/lib/milvus
    ports:
      - "19531:19530"
      - "9092:9091"
    depends_on:
      - "etcd-v2"
      - "minio-v2"

  attu-v2:
    container_name: milvus-attu-v2
    image: zilliz/attu:v2.4.0
    environment:
      MILVUS_URL: milvus-standalone-v2:19530
    ports:
      - "8002:3000"
    depends_on:
      - "standalone-v2"

  # ==========================================
  # 2. 关系型存储层：PostgreSQL + pgAdmin
  # ==========================================
  postgres-v2:
    container_name: finance-rag-postgres-v2
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes_v2/postgres:/var/lib/postgresql/data

  pgadmin-v2:
    container_name: finance-rag-pgadmin-v2
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rag.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes_v2/pgadmin:/var/lib/pgadmin
    depends_on:
      - "postgres-v2"

  # ==========================================
  # 3. 核心业务层：FastAPI 后端引擎 🌟 新增
  # ==========================================
  backend-v2:
    container_name: finance-rag-backend-v2
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    environment:
      # ⚠️ 架构师重点：在 Docker 网络里，不能用 127.0.0.1，必须用容器名！
      - MILVUS_HOST=milvus-standalone-v2
      - MILVUS_PORT=19530 # 注意：容器内部用回原生 19530
      - PG_HOST=finance-rag-postgres-v2
      - PG_PORT=5432      # 容器内部用回原生 5432
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    env_file:
      - .env
    depends_on:
      - standalone-v2
      - postgres-v2
    volumes:
      - .:/app   # 🌟 关键：冒号左边是本地路径，右边是容器路径
  # ==========================================
  # 4. 交互层：Streamlit 页面前端 🌟 新增
  # ==========================================
  frontend-v2:
    container_name: finance-rag-frontend-v2
    build:
      context: .
      dockerfile: Dockerfile
    # 覆盖 Dockerfile 默认的启动命令，改为拉起 Streamlit
    command: ["streamlit", "run", "frontend/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      # 告诉前端，后端接口的地址在哪里
      - API_URL=http://finance-rag-backend-v2:8000
    depends_on:
      - backend-v2
    volumes:
      - .:/app  # 🌟 关键：前端也需要开任意门